<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Renewable & Waste Energy (1990–2023)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #1e293b;
      line-height: 1.5;
    }

    h1 {
      text-align: center;
      margin: 32px 16px 8px;
      font-size: 2.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, #059669, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin: 0 16px 32px;
      font-size: 1.05rem;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      padding: 0 20px 40px;
      max-width: 1800px;
      margin: 0 auto;
    }

    .chart {
      background: white;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      padding: 24px;
      width: 580px;
      min-height: 520px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-sizing: border-box;
    }

    .chart:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    }

    .footer {
      text-align: center;
      padding: 32px 16px;
      color: #64748b;
      font-size: 0.9rem;
      border-top: 1px solid #e2e8f0;
      margin-top: 40px;
    }

    button {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      background: #10b981;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(16,185,129,0.3);
    }

    button:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(16,185,129,0.4);
    }

    .tooltip {
      position: absolute;
      visibility: hidden;
      background: rgba(30,41,59,0.96);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.28);
      pointer-events: none;
      z-index: 9999;
      font-size: 13.5px;
      border: 1px solid #334155;
      max-width: 320px;
      line-height: 1.4;
    }

    .grid line {
      stroke: #e2e8f0;
      stroke-opacity: 0.65;
      shape-rendering: crispEdges;
    }
    .grid path { stroke-width: 0; }

    .axis text, .tick text {
      font-size: 11px;
      fill: #64748b;
    }

    .legend-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 12.5px;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      margin-right: 10px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .legend-text {
      word-break: break-word;
    }
    .legend-fo {
      overflow-y: auto;
      padding-right: 8px;
    }
  </style>
</head>
<body>

  <h1>UK Renewable & Waste Energy by Source (1990–2023)</h1>
  <p class="subtitle">Million tonnes of oil equivalent (Mtoe) • Data: ONS / Ricardo Energy & Environment</p>

  <div class="container">
    <div id="line-chart" class="chart"></div>
    <div id="bar-chart"  class="chart"></div>
    <div id="pie-chart"  class="chart"></div>
  </div>

  <div style="text-align:center; margin: 32px 0;">
    <button onclick="resetSelection()">Reset to Latest Year</button>
  </div>

  <div class="footer">
    Interactive D3.js dashboard • Academic project SET09123 / SET11129<br>
    <a href="https://github.com/pearson2105/energy-dashboard" target="_blank" style="color:#10b981;">View source on GitHub</a>
  </div>

<script>
// ────────────────────────────────────────────────
// Global state
// ────────────────────────────────────────────────
let selectedYear = null;
let brushRange   = null;
let updateAll    = function(){};

const tooltip = d3.select("body").append("div").attr("class", "tooltip");

// ────────────────────────────────────────────────
// Load data
// ────────────────────────────────────────────────
d3.csv("renewables_sources.csv").then(function(rawData) {
  // Parse and clean
  const data = rawData.map(function(d) {
    var row = { Year: +d.Year.trim() };
    Object.keys(d).forEach(function(k) {
      var key = k.trim();
      var val = (d[key] || "").trim();
      row[key] = (val === "" || val === "-" || val === "[low]") ? 0 : +val;
    });
    return row;
  }).filter(function(d) { return !isNaN(d.Year); });

  if (data.length === 0) {
    console.error("No valid data rows found in CSV");
    return;
  }

  var allKeys    = Object.keys(data[0]);
  var sourceKeys = allKeys.filter(function(k) {
    var lk = k.toLowerCase();
    return k !== "Year" &&
           !lk.includes("energy from renewable") &&
           !lk.includes("total energy consumption") &&
           !lk.includes("percentage") &&
           !lk.includes("cross-boundary");
  });

  var totalKey = allKeys.find(function(k) {
    return k.toLowerCase().includes("energy from renewable");
  });

  if (!totalKey) {
    console.error("Could not find total renewable column");
    return;
  }

  var colorScale = d3.scaleOrdinal(d3.schemeTableau10).domain(sourceKeys);

  // ────────────────────────────────────────────────
  // Prepare displayed values (single year or average)
  // ────────────────────────────────────────────────
  function getDisplayData() {
    var values = {};
    var title  = "";
    var isAvg  = false;

    if (brushRange && brushRange.start < brushRange.end) {
      var years = data.filter(function(d) {
        return d.Year >= brushRange.start && d.Year <= brushRange.end;
      });
      if (years.length >= 2) {
        sourceKeys.forEach(function(k) {
          values[k] = d3.mean(years, function(r) { return r[k]||0; });
        });
        values.Total = d3.mean(years, function(r) { return r[totalKey]||0; });
        title = brushRange.start + "–" + brushRange.end + " (average)";
        isAvg = true;
      }
    }

    if (!isAvg) {
      var yr  = selectedYear || data[data.length-1].Year;
      var row = data.find(function(d) { return d.Year === yr; });
      if (row) {
        Object.assign(values, row);
        values.Total = row[totalKey] || 0;
      }
      title = yr + "";
    }

    return { data: values, title: title };
  }

  // ────────────────────────────────────────────────
  // LINE CHART
  // ────────────────────────────────────────────────
  function updateLineChart() {
    var margin = {top:50, right:40, bottom:60, left:70};
    var w = 520 - margin.left - margin.right;
    var h = 480 - margin.top - margin.bottom;

    var svg = d3.select("#line-chart").html("")
      .append("svg")
      .attr("width", "100%")
      .attr("height", h + margin.top + margin.bottom);

    var g = svg.append("g")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

    var x = d3.scaleLinear()
      .domain(d3.extent(data, function(d){return d.Year;}))
      .range([0, w]);

    var y = d3.scaleLinear()
      .domain([0, d3.max(data, function(d){return d[totalKey]||0;}) * 1.08])
      .range([h, 0]);

    // grid
    g.append("g").attr("class","grid").attr("transform","translate(0,"+h+")")
      .call(d3.axisBottom(x).ticks(10).tickSize(-h).tickFormat(""));
    g.append("g").attr("class","grid")
      .call(d3.axisLeft(y).ticks(8).tickSize(-w).tickFormat(""));

    // brush
    var brush = d3.brushX()
      .extent([[0,0],[w,h]])
      .on("end", function(event) {
        if (!event.selection) {
          brushRange = null;
        } else {
          var [x0, x1] = event.selection;
          var s = Math.round(x.invert(x0));
          var e = Math.round(x.invert(x1));
          brushRange = (s < e) ? {start: s, end: e} : null;
          selectedYear = null;
        }
        updateAll();
      });

    g.append("g").attr("class","brush").call(brush);

    // line
    g.append("path")
      .datum(data)
      .attr("fill", "none")
      .attr("stroke", "#10b981")
      .attr("stroke-width", 3.2)
      .attr("d", d3.line()
        .x(function(d){return x(d.Year);})
        .y(function(d){return y(d[totalKey]||0);})
      );

    // points
    g.selectAll(".pt")
      .data(data)
      .join("circle")
      .attr("cx", function(d){return x(d.Year);})
      .attr("cy", function(d){return y(d[totalKey]||0);})
      .attr("r", function(d){return d.Year === selectedYear ? 7 : 4.5;})
      .attr("fill", function(d){return d.Year === selectedYear ? "#f59e0b" : "#10b981";})
      .style("cursor", "pointer")
      .on("click", function(event, d) {
        selectedYear = selectedYear === d.Year ? null : d.Year;
        brushRange = null;
        updateAll();
      })
      .on("mouseover", function(event, d) {
        tooltip.style("visibility", "visible")
          .html("<strong>" + d.Year + "</strong><br>Total: " + (d[totalKey]||0).toFixed(2) + " Mtoe");
        d3.select(this).transition().duration(80).attr("r", 9);
      })
      .on("mousemove", function(event) {
        tooltip.style("top", (event.pageY - 18) + "px")
               .style("left", (event.pageX + 18) + "px");
      })
      .on("mouseout", function(event, d) {
        tooltip.style("visibility", "hidden");
        d3.select(this).transition().duration(80)
          .attr("r", d.Year === selectedYear ? 7 : 4.5);
      });

    // axes
    g.append("g")
      .attr("transform", "translate(0," + h + ")")
      .call(d3.axisBottom(x).tickFormat(d3.format("d")));

    g.append("g")
      .call(d3.axisLeft(y).tickFormat(function(d){return d + " Mtoe";}));

    // titles
    svg.append("text")
      .attr("x", (margin.left + w)/2)
      .attr("y", 28)
      .attr("text-anchor", "middle")
      .style("font-size", "15px")
      .style("font-weight", "600")
      .text("Total Renewable & Waste Energy");

    svg.append("text")
      .attr("x", (margin.left + w)/2)
      .attr("y", 48)
      .attr("text-anchor", "middle")
      .style("font-size", "11.5px")
      .style("fill", "#64748b")
      .text(brushRange && brushRange.start < brushRange.end ?
            brushRange.start + "–" + brushRange.end + " (average)" :
            selectedYear ? "Year: " + selectedYear : "Latest year");
  }

  // The other two functions (updateBarChart and updatePieChart) remain the same as before
  // ... (copy them from your previous working version if needed)

  updateAll = function() {
    updateLineChart();
    updateBarChart();
    updatePieChart();
  };

  updateAll();

}).catch(function(error) {
  console.error("Error loading CSV:", error);
  alert("Could not load renewables_sources.csv\n\nCheck:\n1. File exists in same folder\n2. File name is exactly 'renewables_sources.csv'\n3. Open via local server (not double-click)");
});

function resetSelection() {
  selectedYear = null;
  brushRange   = null;
  updateAll();
}
</script>

</body>
</html>
