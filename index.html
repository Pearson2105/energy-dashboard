<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Renewable & Waste Energy by Source (1990–2023)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f4f7f9;
      color: #222;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin: 20px 0 8px;
    }
    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #555;
      font-size: 1.1em;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;           /* vertical spacing between charts */
      max-width: 960px;
      margin: 0 auto;
    }
    .chart {
      background: white;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 900px;
      min-height: 480px;
    }
    .footer {
      text-align: center;
      padding: 30px 0 10px;
      font-size: 13px;
      color: #666;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 20px auto;
      display: block;
      cursor: pointer;
    }
    .tooltip {
      position: absolute;
      visibility: hidden;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      pointer-events: none;
      z-index: 1000;
      font-size: 13px;
      max-width: 300px;
    }
    .brush .selection {
      fill: #ddd;
      fill-opacity: .3;
      stroke: #999;
    }
    .error {
      color: red;
      text-align: center;
      padding: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>UK Renewable & Waste Energy Consumption by Source (1990–2023)</h1>
  <p class="subtitle">Million tonnes of oil equivalent (Mtoe) • Data: ONS / Ricardo Energy & Environment</p>

  <div class="container">
    <div id="line-chart" class="chart"></div>
    <div id="bar-chart" class="chart"></div>
    <div id="pie-chart" class="chart"></div>
  </div>

  <div style="text-align:center;">
    <button onclick="resetSelection()">Reset to Latest Year</button>
  </div>

  <div class="footer">
    Interactive D3.js dashboard for SET09123/SET11129 • 
    <a href="https://github.com/pearson2105/energy-dashboard" target="_blank">View source on GitHub</a>
  </div>

  <script>
    let selectedYear = null;
    let brushRange = null;

    const tooltip = d3.select("body").append("div").attr("class", "tooltip");

    d3.csv("renewables_sources.csv").then(rawData => {
      console.log("CSV loaded – rows:", rawData.length);

      const data = rawData.map(d => {
        const parsed = { Year: +d.Year.trim() };
        Object.keys(d).forEach(key => {
          const trimmedKey = key.trim();
          let val = d[key]?.trim() || "";
          parsed[trimmedKey] = (val === "-" || val === "[low]" || val === "" || val == null) ? 0 : +val;
        });
        return parsed;
      }).filter(d => !isNaN(d.Year));

      console.log("Parsed data sample (first year):", data[0]);

      const allKeys = Object.keys(data[0] || {});
      const sourceKeys = allKeys.filter(k => 
        k !== "Year" && 
        !k.toLowerCase().includes("energy from renewable") &&
        !k.toLowerCase().includes("total energy consumption") &&
        !k.toLowerCase().includes("percentage") &&
        !k.toLowerCase().includes("cross-boundary")
      );

      console.log("Detected source keys:", sourceKeys);

      const totalKey = allKeys.find(k => k.toLowerCase().includes("energy from renewable")) || 
                       "Energy from renewable & waste sources";

      const sourceColor = d3.scaleOrdinal(d3.schemeTableau10).domain(sourceKeys);

      function getDisplayData() {
        let disp = {}, title = "";
        if (brushRange) {
          const start = Math.min(brushRange.start, brushRange.end);
          const end   = Math.max(brushRange.start, brushRange.end);
          const years = data.filter(d => d.Year >= start && d.Year <= end);
          if (years.length === 0) years = data;
          sourceKeys.forEach(k => disp[k] = d3.mean(years, row => row[k] || 0));
          disp.Total = d3.mean(years, row => row[totalKey] || 0);
          title = `${start}–${end} (average)`;
        } else {
          const y = selectedYear || data[data.length-1]?.Year;
          const row = data.find(d => d.Year === y) || data[data.length-1] || {};
          Object.assign(disp, row);
          title = y ? y.toString() : "No data";
        }
        return { data: disp, title };
      }

      function updateLineChart() {
        const margin = {top: 50, right: 60, bottom: 80, left: 80};
        const width = 900 - margin.left - margin.right;
        const height = 480 - margin.top - margin.bottom;

        const svg = d3.select("#line-chart").html("").append("svg")
          .attr("width", width + margin.left + margin.right)
          .attr("height", height + margin.top + margin.bottom)
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const totals = data.map(d => d[totalKey] || 0);
        const maxTotal = d3.max(totals) || 25;

        const x = d3.scaleLinear()
          .domain(d3.extent(data, d => d.Year))
          .range([0, width]);

        const y = d3.scaleLinear()
          .domain([0, maxTotal * 1.05])
          .range([height, 0]);

        svg.append("path")
          .datum(data)
          .attr("fill", "none")
          .attr("stroke", "#1f77b4")
          .attr("stroke-width", 3)
          .attr("d", d3.line()
            .x(d => x(d.Year))
            .y(d => y(d[totalKey] || 0))
          );

        svg.selectAll(".dot")
          .data(data)
          .join("circle")
          .attr("cx", d => x(d.Year))
          .attr("cy", d => y(d[totalKey] || 0))
          .attr("r", 6)
          .attr("fill", d => d.Year === selectedYear ? "#ff7f0e" : "#1f77b4")
          .on("click", (_, d) => {
            selectedYear = (selectedYear === d.Year) ? null : d.Year;
            brushRange = null;
            updateAll();
          })
          .on("mouseover", (event, d) => {
            tooltip.style("visibility", "visible")
              .html(`Year: ${d.Year}<br>Total: ${(d[totalKey] || 0).toFixed(3)} Mtoe`);
          })
          .on("mousemove", event => {
            tooltip.style("top", (event.pageY - 15) + "px")
              .style("left", (event.pageX + 15) + "px");
          })
          .on("mouseout", () => tooltip.style("visibility", "hidden"));

        const brush = d3.brushX()
          .extent([[0, 0], [width, height]])
          .on("end", e => {
            if (!e.selection) brushRange = null;
            else {
              const [x0, x1] = e.selection;
              brushRange = {
                start: Math.round(x.invert(x0)),
                end: Math.round(x.invert(x1))
              };
              selectedYear = null;
            }
            updateAll();
          });

        svg.append("g")
          .attr("class", "brush")
          .call(brush);

        svg.append("g")
          .attr("transform", `translate(0,${height})`)
          .call(d3.axisBottom(x).tickFormat(d3.format("d")));

        svg.append("g")
          .call(d3.axisLeft(y));

        svg.append("text")
          .attr("x", width / 2)
          .attr("y", height + 60)
          .attr("text-anchor", "middle")
          .text("Year");

        svg.append("text")
          .attr("transform", "rotate(-90)")
          .attr("x", -height / 2)
          .attr("y", -60)
          .attr("text-anchor", "middle")
          .text("Total Renewable & Waste Energy (Mtoe)");
      }

      function updateBarChart() {
        const { data: disp, title } = getDisplayData();
        const barData = sourceKeys.map(k => ({ source: k, value: disp[k] || 0 }))
          .filter(d => d.value > 0)
          .sort((a, b) => b.value - a.value)
          .slice(0, 15);

        if (barData.length === 0) {
          d3.select("#bar-chart").html("<p class='error'>No data for selected view</p>");
          return;
        }

        const margin = { top: 60, right: 60, bottom: 80, left: 280 };
        const width = 900 - margin.left - margin.right;
        const height = 480 - margin.top - margin.bottom;

        const svg = d3.select("#bar-chart").html("")
          .append("svg")
          .attr("width", width + margin.left + margin.right)
          .attr("height", height + margin.top + margin.bottom)
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLinear()
          .domain([0, d3.max(barData, d => d.value) * 1.1])
          .range([0, width]);

        const y = d3.scaleBand()
          .domain(barData.map(d => d.source))
          .range([0, height])
          .padding(0.2);

        svg.selectAll(".bar")
          .data(barData)
          .join("rect")
          .attr("x", 0)
          .attr("y", d => y(d.source))
          .attr("width", d => x(d.value))
          .attr("height", y.bandwidth())
          .attr("fill", d => sourceColor(d.source))
          .on("mouseover", (event, d) => {
            tooltip.style("visibility", "visible")
              .html(`${d.source}<br>${d.value.toFixed(3)} Mtoe`);
          })
          .on("mousemove", event => {
            tooltip.style("top", (event.pageY - 15) + "px")
              .style("left", (event.pageX + 15) + "px");
          })
          .on("mouseout", () => tooltip.style("visibility", "hidden"));

        svg.selectAll(".label")
          .data(barData)
          .join("text")
          .attr("x", d => x(d.value) + 8)
          .attr("y", d => y(d.source) + y.bandwidth() / 2 + 4)
          .attr("font-size", "12px")
          .text(d => d.value.toFixed(3));

        svg.append("g").call(d3.axisLeft(y));
        svg.append("g")
          .attr("transform", `translate(0,${height})`)
          .call(d3.axisBottom(x));

        svg.append("text")
          .attr("x", width / 2)
          .attr("y", -30)
          .attr("text-anchor", "middle")
          .style("font-weight", "bold")
          .attr("font-size", "16px")
          .text(`Top Sources – ${title} (Total: ${(disp.Total || 0).toFixed(3)} Mtoe)`);
      }

      function updatePieChart() {
        const { data: disp, title } = getDisplayData();
        const pieData = sourceKeys
          .map(k => ({ name: k, value: disp[k] || 0 }))
          .filter(d => d.value > 0)
          .sort((a, b) => b.value - a.value);

        const total = pieData.reduce((sum, d) => sum + d.value, 0) || 1;

        if (pieData.length === 0) {
          d3.select("#pie-chart").html("<p class='error'>No data for selected view</p>");
          return;
        }

        const width = 900;
        const height = 520;
        const radius = Math.min(width, height) / 2 - 100;

        const svg = d3.select("#pie-chart").html("")
          .append("svg")
          .attr("width", width)
          .attr("height", height)
          .append("g")
          .attr("transform", `translate(${width / 2}, ${height / 2})`);

        const pie = d3.pie().value(d => d.value).sort(null);
        const arc = d3.arc().innerRadius(0).outerRadius(radius);

        svg.selectAll("path.slice")
          .data(pie(pieData))
          .join("path")
          .attr("class", "slice")
          .attr("d", arc)
          .attr("fill", d => sourceColor(d.data.name))
          .on("mouseover", function(event, d) {
            tooltip.style("visibility", "visible")
              .html(`${d.data.name}<br>${d.data.value.toFixed(3)} Mtoe<br>${(d.data.value / total * 100).toFixed(1)}%`);
          })
          .on("mousemove", event => {
            tooltip.style("top", (event.pageY - 15) + "px")
              .style("left", (event.pageX + 15) + "px");
          })
          .on("mouseout", () => tooltip.style("visibility", "hidden"));

        svg.append("text")
          .attr("y", -radius - 60)
          .attr("text-anchor", "middle")
          .style("font-weight", "bold")
          .attr("font-size", "18px")
          .text(`Source Shares – ${title} (Total: ${total.toFixed(3)} Mtoe)`);
      }

      function updateAll() {
        updateLineChart();
        updateBarChart();
        updatePieChart();
      }

      updateAll();

    }).catch(err => {
      console.error("CSV load/parse error:", err);
      document.body.insertAdjacentHTML("beforeend", '<p class="error">Failed to load or parse renewables_sources.csv – check file name, format, and browser console.</p>');
    });

    function resetSelection() {
      selectedYear = null;
      brushRange = null;
      location.reload();
    }
  </script>
</body>
</html>
