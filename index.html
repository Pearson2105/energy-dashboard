<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Renewable & Waste Energy (1990–2023)</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
margin:0;
background:#f8fafc;
color:#1e293b;

background-clip:text;
-webkit-text-fill-color:transparent;
}

}

box-sizing:border-box;

.footer{

button{

<body>

<h1>UK Renewable & Waste Energy by Source (1990–2023)</h1>
<p class="subtitle">Million tonnes of oil equivalent (Mtoe)</p>

<div class="container">
<div id="line-chart" class="chart"></div>
<div id="bar-chart" class="chart"></div>
<div id="pie-chart" class="chart"></div>
</div>

<div style="text-align:center;margin:30px">
<button onclick="resetSelection()">Reset to Latest Year</button>
</div>

<div class="footer">
<a href="https://github.com/pearson2105/energy-dashboard" target="_blank">View source on GitHub</a>
</div>

<script>

let selectedYear=null
let brushRange=null
let updateAll=()=>{}

const tooltip=d3.select("body").append("div").attr("class","tooltip")

d3.csv("renewables_sources.csv").then(rawData=>{

const data=rawData.map(d=>{
const row={Year:+d.Year}
Object.keys(d).forEach(k=>{
if(k!=="Year"){
const v=(d[k]||"").trim()
row[k]=(v===""||v==="-"||v==="[low]")?0:+v
}
})
return row
})

const allKeys=Object.keys(data[0])

const sourceKeys=allKeys.filter(k=>{
const l=k.toLowerCase()
return k!=="Year" &&
!l.includes("total") &&
!l.includes("percentage")
})

const totalKey=allKeys.find(k=>k.toLowerCase().includes("energy from renewable"))

const colorScale=d3.scaleOrdinal(d3.schemeTableau10).domain(sourceKeys)

function getDisplayData(){

let values={}
let title=""
let avg=false

if(brushRange && brushRange.start<brushRange.end){

let years=data.filter(d=>d.Year>=brushRange.start && d.Year<=brushRange.end)

if(years.length>=2){

sourceKeys.forEach(k=>{
values[k]=d3.mean(years,r=>r[k]||0)
})

values.Total=d3.mean(years,r=>r[totalKey]||0)

title=`${brushRange.start}–${brushRange.end} (average)`
avg=true

}
}

if(!avg){

const yr=selectedYear || data[data.length-1].Year
const row=data.find(d=>d.Year===yr)

Object.assign(values,row)

values.Total=row?.[totalKey]||0
title=yr+""

}

return {data:values,title}

}

function updateLineChart(){

const margin={top:50,right:30,bottom:60,left:70}
const w=520-margin.left-margin.right
const h=420-margin.top-margin.bottom

const svg=d3.select("#line-chart").html("")
.append("svg")
.attr("width","100%")
.attr("height",h+margin.top+margin.bottom)

const g=svg.append("g")
.attr("transform",`translate(${margin.left},${margin.top})`)

const x=d3.scaleLinear()
.domain(d3.extent(data,d=>d.Year))
.range([0,w])

const y=d3.scaleLinear()
.domain([0,d3.max(data,d=>d[totalKey])*1.1])
.range([h,0])

g.append("path")
.datum(data)
.attr("fill","none")
.attr("stroke","#10b981")
.attr("stroke-width",3)
.attr("d",d3.line().x(d=>x(d.Year)).y(d=>y(d[totalKey])))

g.selectAll("circle")
.data(data)
.join("circle")
.attr("cx",d=>x(d.Year))
.attr("cy",d=>y(d[totalKey]))
.attr("r",4)
.attr("fill","#10b981")
.style("cursor","pointer")
.on("click",(_,d)=>{
selectedYear=d.Year
brushRange=null
updateAll()
})
.on("mouseover",(e,d)=>{
tooltip.style("visibility","visible")
.html(`<b>${d.Year}</b><br>${d[totalKey].toFixed(2)} Mtoe`)
})
.on("mousemove",e=>tooltip.style("top",(e.pageY-20)+"px").style("left",(e.pageX+15)+"px"))
.on("mouseout",()=>tooltip.style("visibility","hidden"))

g.append("g")
.attr("transform",`translate(0,${h})`)
.call(d3.axisBottom(x).tickFormat(d3.format("d")))

g.append("g")
.call(d3.axisLeft(y))

svg.append("text")
.attr("x","50%")
.attr("y",24)
.attr("text-anchor","middle")
.style("font-weight","600")
.text("Total Renewable Energy")

}

function updateBarChart(){

const disp=getDisplayData()

const bars=sourceKeys
.map(k=>({source:k,value:disp.data[k]||0}))
.filter(d=>d.value>0)
.sort((a,b)=>b.value-a.value)
.slice(0,15)

const margin={top:50,right:20,bottom:30,left:220}
const w=520-margin.left-margin.right
const h=420-margin.top-margin.bottom

const svg=d3.select("#bar-chart").html("")
.append("svg")
.attr("width","100%")
.attr("height",h+margin.top+margin.bottom)

const g=svg.append("g")
.attr("transform",`translate(${margin.left},${margin.top})`)

const x=d3.scaleLinear()
.domain([0,d3.max(bars,d=>d.value)*1.1])
.range([0,w])

const y=d3.scaleBand()
.domain(bars.map(d=>d.source))
.range([0,h])
.padding(0.25)

g.selectAll("rect")
.data(bars)
.join("rect")
.attr("y",d=>y(d.source))
.attr("width",d=>x(d.value))
.attr("height",y.bandwidth())
.attr("fill",d=>colorScale(d.source))

g.append("g").call(d3.axisLeft(y))
g.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x))

svg.append("text")
.attr("x","50%")
.attr("y",24)
.attr("text-anchor","middle")
.style("font-weight","600")
.text(`Top Sources – ${disp.title}`)

}

function updatePieChart(){

const disp=getDisplayData()

let slices=sourceKeys
.map(k=>({name:k,value:disp.data[k]||0}))
.filter(d=>d.value>0)
.sort((a,b)=>b.value-a.value)

const total=slices.reduce((s,d)=>s+d.value,0)

const r=120
const cx=160
const h=480

const svg=d3.select("#pie-chart").html("")
.append("svg")
.attr("width","100%")
.attr("height",h)

const pieG=svg.append("g")
.attr("transform",`translate(${cx},${h/2})`)

const pie=d3.pie().value(d=>d.value)
const arc=d3.arc().innerRadius(0).outerRadius(r)

pieG.selectAll("path")
.data(pie(slices))
.join("path")
.attr("d",arc)
.attr("fill",d=>colorScale(d.data.name))
.attr("stroke","#fff")
.on("mouseover",(e,d)=>{
tooltip.style("visibility","visible")
.html(`${d.data.name}<br>${d.data.value.toFixed(2)} Mtoe<br>${(d.data.value/total*100).toFixed(1)}%`)
})
.on("mousemove",e=>tooltip.style("top",(e.pageY-20)+"px").style("left",(e.pageX+15)+"px"))
.on("mouseout",()=>tooltip.style("visibility","hidden"))

svg.append("text")
.attr("x",cx)
.attr("y",30)
.attr("text-anchor","middle")
.style("font-weight","600")
.text(`Source Shares – ${disp.title}`)

const legendX=cx+r+40
const legendWidth=420

const fo=svg.append("foreignObject")
.attr("x",legendX)
.attr("y",50)
.attr("width",legendWidth)
.attr("height",360)

const legend=fo.append("xhtml:div")
.attr("class","legend-scroll")

slices.forEach(d=>{

const pct=(d.value/total*100).toFixed(1)

const item=legend.append("div")
.attr("class","legend-item")

item.append("div")
.attr("class","legend-color")
.style("background",colorScale(d.name))

item.append("div")
.attr("class","legend-text")
.html(`${d.name} – <strong>${pct}%</strong> (${d.value.toFixed(2)} Mtoe)`)

})

}

updateAll=()=>{
updateLineChart()
updateBarChart()
updatePieChart()
}

updateAll()

})

function resetSelection(){
selectedYear=null
brushRange=null
updateAll()
}

</script>

</body>
</html>
